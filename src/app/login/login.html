<div class="full-screen-container">
  <h2>Iniciar Sesión</h2>
  <img src="scanerlogo.png" alt="Scanner Logo" class="logo" />
  
  <form (ngSubmit)="login()" #loginForm="ngForm">
    <label for="username">Usuario:</label>
    <input
      type="text"
      id="username"
      [(ngModel)]="username"
      name="username"
      required
      #usernameInput="ngModel"
    />
    <div class="error-message" *ngIf="usernameInput.invalid && usernameInput.touched">
      Por favor ingresa tu nombre de usuario.
    </div>

    <label for="password">Contraseña:</label>
    <input
      type="password"
      id="password"
      [(ngModel)]="password"
      name="password"
      required
      minlength="6"
      #passwordInput="ngModel"
    />
    <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">
      La contraseña debe tener al menos 6 caracteres.
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Ingresar</button>
  </form>

  <button class="link-button" (click)="goToRegister()">Registrarse</button>
</div>
