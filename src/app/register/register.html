<!-- registro.component.html -->
<div class="full-screen-container">
  <h2>Registro</h2>
  <img src="scanerlogo.png" alt="Scanner Logo" class="logo" style="scrollbar-shadow-color: blue;" />
  
  <form (ngSubmit)="register()" #registroForm="ngForm">
    <label for="email">Correo:</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      #emailInput="ngModel"
    />
    <div class="error-message" *ngIf="emailInput.invalid && emailInput.touched">
      Por favor ingresa un correo válido.
    </div>

    <label for="password">Contraseña:</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="password"
      required
      minlength="6"
      #passwordInput="ngModel"
    />
    <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">
      La contraseña debe tener al menos 6 caracteres.
    </div>

    <button type="submit" [disabled]="registroForm.invalid">Registrarse</button>
  </form>

  <button class="link-button" (click)="goToLogin()">Iniciar sesión</button>
</div>
