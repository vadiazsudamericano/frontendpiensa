<div class="full-screen-container">
  

  <h2>Registrarse</h2>
<img src="scanerlogo.png" alt="Scanner Logo" class="logo" width="550px" />
  <form (ngSubmit)="register()" #registerForm="ngForm">
    <label for="username">Usuario:</label>
    <input
      type="text"
      id="username"
      [(ngModel)]="username"
      name="username"
      required
      #usernameInput="ngModel"
    />
    <div class="error-message" *ngIf="usernameInput.invalid && usernameInput.touched">
      Por favor ingresa un nombre de usuario.
    </div>

    <label for="password">Contraseña:</label>
    <input
      type="password"
      id="password"
      [(ngModel)]="password"
      name="password"
      required
      minlength="6"
      #passwordInput="ngModel"
    />
    <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">
      La contraseña debe tener al menos 6 caracteres.
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Registrarse</button>
  </form>

  <button class="link-button" (click)="goToLogin()">Volver a Iniciar Sesión</button>
</div>
